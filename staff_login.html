<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Staff Login - Vanity Creation</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="staff_login.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div class="login-wrapper">

        <div class="top-accent-line"></div>

        <h1 class="welcome-heading">Welcome back!</h1>
        <p class="welcome-subtext">Sign in to continue.</p>

        <div class="login-card-container">

            <form class="login-form" id="staffLoginForm">

                <div class="input-group">
                    <input type="email" id="email" autocomplete="email" required placeholder=" ">
                    <label for="email">
                        Email Address
                    </label>
                </div>

                <div class="input-group password-group">

                    <input type="password" id="password" autocomplete="current-password" required placeholder=" ">

                    <label for="password">
                        Password
                    </label>

                    <button type="button" class="toggle-password" id="passwordToggle">
                        <i class="fa-regular fa-eye-slash"></i>
                    </button>

                </div>

                <div class="forgot-password-wrapper">
                    <a href="staff_forgot_pw.html" class="forgot-link">
                        Forgot Password
                    </a>
                </div>

                <button type="submit" class="submit-login-btn">
                    Log in
                </button>

                <div class="form-divider">
                    <span>or</span>
                </div>

                <button type="button" class="google-login-btn" id="googleLoginBtn">
                    <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18">

                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />

                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />

                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"
                            fill="#FBBC05" />

                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.7-4.53z"
                            fill="#EA4335" />

                    </svg>

                    <span>Log in with Google</span>
                </button>

                <p class="signup-footer-text">
                    Don't have an account?
                    <a href="staff_signup.html">Sign up</a>
                </p>

            </form>

        </div>

    </div>

    <script>

        const SUPABASE_URL = "https://rejaosaylldyhvbyhgxl.supabase.co";

        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJlamFvc2F5bGxkeWh2YnloZ3hsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjE3MDUsImV4cCI6MjA5NjU5NzcwNX0.1GNinip2Qs923GaoVe6E2EGxp6ixnsJgF4bfDkH2K4A";

        const supabaseClient = supabase.createClient(
            SUPABASE_URL,
            SUPABASE_ANON_KEY
        );

        document.getElementById("googleLoginBtn").addEventListener("click", async (e) => {
  e.preventDefault();

  const { error } = await supabaseClient.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: `${window.location.origin}/auth_callback.html`
    }
  });

  if (error) {
    console.error(error);
    alert(error.message);
  }
});


// EMAIL + PASSWORD LOGIN + OTP FLOW
document.getElementById("staffLoginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  // 1. LOGIN USER
  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  console.log("LOGIN SUCCESS:", data.user.email);

  try {
    // 2. SEND OTP
    const res = await fetch(`${SUPABASE_URL}/functions/v1/send-otp`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: data.user.email
      })
    });

    const text = await res.text();

    let result;
    try {
      result = JSON.parse(text);
    } catch (e) {
      console.log("Raw response:", text);
    }

    if (!res.ok) {
      alert("OTP failed: " + text);
      return;
    }

    // 3. GO TO OTP PAGE
    window.location.href = "verification_code.html";

  } catch (err) {
    console.error("OTP ERROR:", err);
    alert("Failed to send OTP");
  }
});
</script>
</body>

</html>
