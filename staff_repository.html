
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repository</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="staff_dashboard.css">
    <link rel="stylesheet" href="client_dashboard.css">
    <link rel="stylesheet" href="staff_repository.css">
</head>

<body>

    <header class="top-navbar">
        <div class="logo-section">
            <div class="logo-box"></div>
            <span>VANITY CREATION</span>
        </div>

        <div class="navbar-right">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search photos by tag, email, or file name">
            </div>
            <div class="user-profile">
                <img id="userAvatar" class="avatar" src="https://via.placeholder.com/42" alt="Profile">
                <span id="userName">Loading...</span>
            </div>
        </div>
    </header>

    <div class="dashboard-wrapper">

        <aside class="sidebar">
            <nav>
                <a href="staff_dashboard.html">
                    <i class="fa-solid fa-table-cells-large"></i>
                    Home
                </a>
                <a href="client_dashboard.html">
                    <i class="fa-solid fa-users"></i>
                    Clients
                </a>
                <a href="staff_repository.html" class="active">
                    <i class="fa-solid fa-book"></i>
                    Repository
                </a>
                <a href="staff_payment.html">
                    <i class="fa-solid fa-credit-card"></i>
                    Payments
                </a>
                <a href="#">
                    <i class="fa-solid fa-user"></i>
                    Profile
                </a>
                <a href="#">
                    <i class="fa-solid fa-gear"></i>
                    Settings
                </a>
            </nav>

            <a href="landing_page.html" class="logout-btn" id="logoutBtn">
                <i class="fa-solid fa-arrow-right-from-bracket logout-icon"></i>
                <span>Log out</span>
            </a>
        </aside>

        <main class="content">
            
            <div class="repo-top-header-block">
                <div class="page-header">
                    <h1>Repository</h1>
                    <p>Manage and organize folders and images stored in your workspace.</p>
                </div>
                
                <div class="filter-dropdown-wrapper">
                    <button class="add-new-client-btn" id="addNewDropdownTrigger">
                        <i class="fa-solid fa-plus"></i>
                        Add New
                    </button>
                    <div class="add-new-dropdown-box" id="addNewDropdownMenu">
                        <button id="uploadPhotosActionOption">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                            <span>Upload Photos</span>
                        </button>
                        <button id="createFolderActionOption">
                            <i class="fa-regular fa-folder"></i>
                            <span>Create New Folder</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="repo-sub-actions-container">
                <div class="repo-filter-selects-group">
                    <div class="repo-select-wrapper">
                        <select>
                            <option>All tags</option>
                        </select>
                        <i class="fa-solid fa-chevron-down select-arrow"></i>
                    </div>
                    <div class="repo-select-wrapper">
                        <select>
                            <option>All events</option>
                        </select>
                        <i class="fa-solid fa-chevron-down select-arrow"></i>
                    </div>
                    <div class="repo-select-wrapper">
                        <select>
                            <option>Sort by:</option>
                        </select>
                        <i class="fa-solid fa-chevron-down select-arrow"></i>
                    </div>
                </div>

                <div class="client-actions-row">
                    <div class="table-search-box">
                        <input type="text" id="repoFolderSearchInput" placeholder="Search repository...">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                </div>
            </div>

            <div class="ui-table-card-panel repo-grid-card-panel">
                <div class="repo-folders-grid-panel" id="repositoryFoldersGrid">
                    <div class="empty-repo-message">Loading active directories...</div>
                </div>
            </div>

        </main>
    </div>

    <div class="modal-overlay" id="createFolderModal">
        <div class="modal-card">
            <div class="modal-header">
                <i class="fa-solid fa-folder-plus"></i>
                <h2>New Folder</h2>
            </div>
            
            <form class="modal-form" id="newFolderForm">
                <p class="form-instruction">Enter folder information.</p>
                
                <div class="form-field">
                    <input type="text" id="folderNameInput" placeholder="Folder Name" required value="Untitled Folder">
                </div>
                
                <button type="submit" class="save-client-btn">Create Folder</button>
            </form>
        </div>
    </div>

    <input type="file" id="photoFilesUploader" multiple accept="image/*" style="display: none;">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseClient = supabase.createClient(
            "https://rejaosaylldyhvbyhgxl.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJlamFvc2F5bGxkeWh2YnloZ3hsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjE3MDUsImV4cCI6MjA5NjU5NzcwNX0.1GNinip2Qs923GaoVe6E2EGxp6ixnsJgF4bfDkH2K4A"
        );

        let currentUser = null;

        window.addEventListener("load", async () => {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session) {
                    window.location.href = "staff_login.html";
                    return;
                }
                currentUser = session.user;
                
                let { data: profile } = await supabaseClient
                    .from("staff_profiles")
                    .select("*")
                    .eq("id", currentUser.id)
                    .single();

                if (profile) {
                    document.getElementById("userName").textContent = profile.full_name;
                    if (profile.avatar_url) {
                        document.getElementById("userAvatar").src = profile.avatar_url;
                    }
                }

                await loadRepositoryFolders();

            } catch (err) {
                console.error("Initialization error:", err);
            }
        });

        document.getElementById("logoutBtn").addEventListener("click", async (e) => {
            e.preventDefault();
            await supabaseClient.auth.signOut();
            window.location.href = "staff_login.html";
        });

        // Toggle dropdown options block
        const addNewBtn = document.getElementById('addNewDropdownTrigger');
        const addNewMenu = document.getElementById('addNewDropdownMenu');

        addNewBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            addNewMenu.classList.toggle('show');
        });

        document.addEventListener('click', (e) => {
            if (!addNewMenu.contains(e.target) && e.target !== addNewBtn) {
                addNewMenu.classList.remove('show');
            }
        });

        const createFolderOption = document.getElementById('createFolderActionOption');
        const folderModal = document.getElementById('createFolderModal');
        const newFolderForm = document.getElementById('newFolderForm');

        createFolderOption.addEventListener('click', () => {
            addNewMenu.classList.remove('show');
            folderModal.classList.add('show');
            setTimeout(() => document.getElementById('folderNameInput').select(), 100);
        });

        folderModal.addEventListener('click', (e) => {
            if (e.target === folderModal) {
                folderModal.classList.remove('show');
                newFolderForm.reset();
            }
        });

        newFolderForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const folderName = document.getElementById('folderNameInput').value.trim();
            if (!folderName || !currentUser) return;

            try {
                const { error } = await supabaseClient
                    .from('folders')
                    .insert({
                        user_id: currentUser.id,
                        folder_name: folderName
                    });

                if (error) throw error;

                folderModal.classList.remove('show');
                newFolderForm.reset();
                await loadRepositoryFolders();

            } catch (err) {
                alert("Database folder generation failed: " + err.message);
            }
        });

        async function loadRepositoryFolders() {
            const gridContainer = document.getElementById('repositoryFoldersGrid');
            if (!gridContainer) return;

            try {
                const { data: folders, error } = await supabaseClient
                    .from('folders')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!folders || folders.length === 0) {
                    gridContainer.innerHTML = `<div class="empty-repo-message">No folders created yet. Click 'Add New' to begin.</div>`;
                    return;
                }

                gridContainer.innerHTML = '';
                folders.forEach(folder => {
                    const cardNode = document.createElement('div');
                    cardNode.className = 'folder-card-item';
                    cardNode.setAttribute('onclick', `MapsToFolderView('${folder.id}')`);
                    cardNode.innerHTML = `
                        <div class="folder-icon-circle">
                            <i class="fa-solid fa-folder"></i>
                        </div>
                        <div class="folder-meta-details">
                            <h3>${escapeHtml(folder.folder_name)}</h3>
                        </div>
                    `;
                    gridContainer.appendChild(cardNode);
                });

            } catch (err) {
                console.error("Error loading folders:", err);
                gridContainer.innerHTML = `<div class="empty-repo-message" style="color: #cc3333;">Failed to load system folders repository maps.</div>`;
            }
        }

        function navigateToFolderView(folderId) {
            console.log("Navigating to folder ID:", folderId);
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        const uploadPhotosOption = document.getElementById('uploadPhotosActionOption');
        const hiddenFileInput = document.getElementById('photoFilesUploader');

        uploadPhotosOption.addEventListener('click', () => {
            addNewMenu.classList.remove('show');
            hiddenFileInput.click();
        });

        hiddenFileInput.addEventListener('change', (event) => {
            const files = event.target.files;
            if (!files.length || !currentUser) return;
            console.log(`Processing image assets stream bundle injection pipeline for ${files.length} frames.`);
        });
    </script>
</body>

</html>
