<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Started - Vanity Creation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="staff_signup.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <div class="login-wrapper">

    <div class="top-accent-line"></div>

    <h1 class="welcome-heading">Get Started</h1>
    <p class="welcome-subtext">Create your account in seconds.</p>

    <div class="login-card-container">

      <form class="login-form" id="staffSignUpForm">

        <div class="input-group">
          <input type="text" id="fullName" autocomplete="name" required placeholder=" ">
          <label for="fullName">Full Name</label>
        </div>

        <div class="input-group">
          <input type="email" id="email" autocomplete="email" required placeholder=" ">
          <label for="email">Email Address</label>
        </div>

        <div class="input-group password-group">
          <input type="password" id="password" autocomplete="new-password" required placeholder=" ">
          <label for="password">Password</label>

          <button type="button" class="toggle-password" id="passwordToggle">
            <i class="fa-regular fa-eye-slash"></i>
          </button>
        </div>

        <button type="submit" class="submit-login-btn">
          Sign up
        </button>

        <p class="signup-footer-text">
          Already have an account? <a href="staff_login.html">Log in</a>
        </p>

      </form>

    </div>

  </div>

  <script>

    const SUPABASE_URL = "https://rejaosaylldyhvbyhgxl.supabase.co";

    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJlamFvc2F5bGxkeWh2YnloZ3hsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjE3MDUsImV4cCI6MjA5NjU5NzcwNX0.1GNinip2Qs923GaoVe6E2EGxp6ixnsJgF4bfDkH2K4A";


    const supabaseClient = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    const passwordToggle = document.getElementById("passwordToggle");
    const passwordInput = document.getElementById("password");
    const toggleIcon = passwordToggle.querySelector("i");

    passwordToggle.addEventListener("click", () => {
      const isHidden = passwordInput.type === "password";

      passwordInput.type = isHidden ? "text" : "password";
      toggleIcon.className = isHidden
        ? "fa-regular fa-eye"
        : "fa-regular fa-eye-slash";
    });


    
    document.getElementById("staffSignUpForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {

        const { data: signUpData, error: signUpError } =
          await supabaseClient.auth.signUp({
            email,
            password
          });

        if (signUpError) {
          console.error(signUpError);
          alert("Signup failed: " + signUpError.message);
          return;
        }

        const user = signUpData.user;

        if (!user) {
          alert("No user returned. Check email confirmation in Supabase.");
          return;
        }

        console.log("USER CREATED:", user.id);

        const { error: profileError } = await supabaseClient
          .from("staff_profiles")
          .insert([
            {
              id: user.id,
              full_name: fullName,
              email: email,
              role: "staff",
              verified: true,
              avatar_url: null
            }
          ]);

        if (profileError) {
          console.error("PROFILE ERROR:", profileError);
          alert("Profile save failed: " + profileError.message);
          return;
        }

        alert("Account created successfully!");
        window.location.href = "staff_login.html";

      } catch (err) {
        console.error("UNEXPECTED ERROR:", err);
        alert("Unexpected error occurred");
      }
    });
  </script>

</body>

</html>
