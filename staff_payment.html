        <main class="workspace-panel">
            
            <div class="panel-header-desc">
                <h1>Payments</h1>
                <p>Track and manage transaction records.</p>
            </div>

            <div class="filter-action-row">
                <div class="filter-dropdowns-group">
                    
                    <div class="select-field-box">
                        <select id="statusSelect" class="interactive-select">
                            <option value="all">All status</option>
                            <option value="Paid">Paid</option>
                            <option value="Expired">Expired</option>
                        </select>
                        <svg class="chevron-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>

                    <div class="select-field-box">
                        <select id="methodSelect" class="interactive-select">
                            <option value="all">All payment methods</option>
                            <option value="GCash">GCash</option>
                            <option value="Maya">Maya</option>
                        </select>
                        <svg class="chevron-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>

                </div>

                <div class="filter-search-group">
                    <div class="inline-search-box">
                        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" placeholder="Search customer or email..." class="search-input-element">
                    </div>
                    <button class="filter-icon-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                        <span>Filter</span>
                    </button>
                </div>
            </div>

            <div class="table-frame-wrapper">
                <table class="data-records-table" id="paymentsTable">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Client</th>
                            <th>Access</th>
                            <th>Amount</th>
                            <th>Payment Method</th>
                            <th>Status</th>
                            <th>Payment Date</th>
                        </tr>
                    </thead>
                  <tbody id="paymentsBody">
    <tr>
        <td colspan="7" class="empty-state">
            No payment records found.
        </td>
    </tr>
</tbody>
                </table>
            </div>

        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const statusFilter = document.getElementById('statusSelect');
            const methodFilter = document.getElementById('methodSelect');
            const dataRows = document.querySelectorAll('.transaction-row');

            function performTableFiltering() {
                const selectedStatus = statusFilter.value;
                const selectedMethod = methodFilter.value;

                dataRows.forEach(row => {
                    const rowStatus = row.getAttribute('data-status');
                    const rowMethod = row.getAttribute('data-method');

                    const matchesStatus = (selectedStatus === 'all' || rowStatus === selectedStatus);
                    const matchesMethod = (selectedMethod === 'all' || rowMethod === selectedMethod);

                    if (matchesStatus && matchesMethod) {
                        row.style.display = ""; // Shows row element frame line if both match
                    } else {
                        row.style.display = "none"; // Hides data layout line securely
                    }
                });
            }

            statusFilter.addEventListener('change', performTableFiltering);
            methodFilter.addEventListener('change', performTableFiltering);
        });
    </script>
</body>
</html>
