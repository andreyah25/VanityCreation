<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="staff_dashboard.css?v=1.1">
    <link rel="stylesheet" href="client_dashboard.css?v=1.1">
    <link rel="stylesheet" href="staff_payment.css">
</head>
<body>

    <header class="top-navbar">
        <div class="logo-section">
            <div class="logo-box"></div>
            <span>VANITY CREATION</span>
        </div>
        <div class="navbar-right">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search photos by tag, email, or file name">
            </div>
            <div class="user-profile">
                <img id="userAvatar" class="avatar" src="https://via.placeholder.com/42" alt="Profile">
                <span id="userName">Loading...</span>
            </div>
        </div>
    </header>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <nav>
                <a href="staff_dashboard.html"><i class="fa-solid fa-table-cells-large"></i> Home</a>
                <a href="client_dashboard.html"><i class="fa-solid fa-users"></i> Clients</a>
                <a href="staff_repository.html"><i class="fa-solid fa-book"></i> Repository</a>
                <a href="staff_payment.html" class="active"><i class="fa-solid fa-credit-card"></i> Payments</a>
                <a href="#"><i class="fa-solid fa-user"></i> Profile</a>
                <a href="#"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>
            <a href="landing_page.html" class="logout-btn" id="logoutBtn">
                <i class="fa-solid fa-arrow-right-from-bracket logout-icon"></i>
                <span>Log out</span>
            </a>
        </aside>

        <main class="content">
            <div class="client-header-container">
                <div class="page-header">
                    <h1>Payments</h1>
                    <p>Track and manage transaction records.</p>
                </div>
                
                <div class="client-actions-row">
                    <div class="filter-dropdown-wrapper">
                        <button class="table-filter-btn" id="statusFilterBtn">
                            All status <i class="fa-solid fa-chevron-down"></i>
                        </button>
                        <div class="filter-dropdown-menu" id="statusDropdown">
                            <a href="#" data-filter="paid">Paid</a>
                            <a href="#" data-filter="pending">Pending</a>
                            <div class="dropdown-divider"></div>
                            <a href="#" data-filter="all" class="clear-filter">Clear Filter</a>
                        </div>
                    </div>

                    <div class="filter-dropdown-wrapper">
                        <button class="table-filter-btn" id="methodFilterBtn">
                            All payment methods <i class="fa-solid fa-chevron-down"></i>
                        </button>
                        <div class="filter-dropdown-menu" id="methodDropdown">
                            <a href="#" data-filter="card">Credit Card</a>
                            <a href="#" data-filter="paypal">PayPal</a>
                            <div class="dropdown-divider"></div>
                            <a href="#" data-filter="all" class="clear-filter">Clear Filter</a>
                        </div>
                    </div>

                    <div class="table-search-box">
                        <input type="text" placeholder="Search customer or email...">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                </div>
            </div>

            <div class="ui-table-card-panel">
                <table class="ui-data-grid">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Client</th>
                            <th>Access</th>
                            <th>Amount</th>
                            <th>Payment Method</th>
                            <th>Status</th>
                            <th>Payment Date</th>
                        </tr>
                    </thead>
                    <tbody id="paymentTableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        function setupDropdown(btnId, dropdownId) {
            const btn = document.getElementById(btnId);
            const menu = document.getElementById(dropdownId);
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                menu.classList.toggle('show');
            });
            document.addEventListener('click', () => menu.classList.remove('show'));
        }
        setupDropdown('statusFilterBtn', 'statusDropdown');
        setupDropdown('methodFilterBtn', 'methodDropdown');
    </script>
</body>
</html>
