<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login - Access Your Photos</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="staff_login.css">
</head>

<body>

    <div class="login-wrapper">

        <div class="top-accent-line"></div>

        <h1 class="welcome-heading">Access Your Photos</h1>

        <p class="welcome-subtext">
            Continue to your image repository by signing in to your account.
        </p>

        <div class="login-card-container">

            <form id="customerLoginForm" class="login-form">

                <!-- EMAIL -->
                <div class="input-group">
                    <input type="email" id="email" required placeholder=" ">
                    <label>Email Address</label>
                </div>

                <!-- PASSWORD -->
                <div class="input-group password-group">
                    <input type="password" id="password" required placeholder=" ">
                    <label>Password</label>

                    <button type="button" class="toggle-password" id="passwordToggle">
                        <i class="fa-regular fa-eye-slash"></i>
                    </button>
                </div>

                <!-- FORGOT -->
                <div class="forgot-password-wrapper">
                    <a href="#" class="forgot-link">Forgot Password</a>
                </div>

                <!-- LOGIN BUTTON (MATCH CSS CLASS) -->
                <button type="submit" class="submit-login-btn">
                    Log in
                </button>

                <!-- DIVIDER -->
                <div class="form-divider">
                    <span>or</span>
                </div>

                <!-- GOOGLE LOGIN -->
                <button type="button" id="googleLoginBtn" class="google-login-btn">
                    <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.7-4.53z"
                            fill="#EA4335" />
                    </svg>
                    <span>Log in with Google</span>
                </button>

            </form>

        </div>

    </div>

    <script>
        /* FIX SUPABASE */
        const SUPABASE_URL = "https://rejaosaylldyhvbyhgxl.supabase.co";

        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJlamFvc2F5bGxkeWh2YnloZ3hsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjE3MDUsImV4cCI6MjA5NjU5NzcwNX0.1GNinip2Qs923GaoVe6E2EGxp6ixnsJgF4bfDkH2K4A";

        const supabaseClient =
            supabase.createClient(
                SUPABASE_URL,
                SUPABASE_ANON_KEY
            );
        /* SAVE USER */
        async function saveUser(user) {
            if (!user) return;

            const { error } = await supabaseClient.from("profiles").upsert({
                id: user.id,
                email: user.email,
                full_name: user.user_metadata?.name || "",
                avatar_url: user.user_metadata?.avatar_url || ""
            });

            if (error) console.log("DB Error:", error.message);
        }

        /* EMAIL LOGIN */
        document.getElementById("customerLoginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                alert("Login failed: " + error.message);
                return;
            }

            await saveUser(data.user);

            alert("Login successful!");
            window.location.href = "generated_link_page.html";
        });

        /* GOOGLE LOGIN */
        document.getElementById("googleLoginBtn").addEventListener("click", async () => {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: "google",
                options: {
                    redirectTo: window.location.origin + "/generated_link_page.html"
                }
            });

            if (error) {
                alert(error.message);
            }
        });

        /* PASSWORD TOGGLE */
        document.getElementById("passwordToggle").addEventListener("click", () => {
            const pass = document.getElementById("password");
            pass.type = pass.type === "password" ? "text" : "password";
        });
    </script>
</body>

</html>
