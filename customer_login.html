<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login - Access Your Photos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="staff_login.css">
</head>

<body>

    <div class="login-wrapper">
        <div class="top-accent-line"></div>

        <h1 class="welcome-heading">Access Your Photos</h1>
        <p class="welcome-subtext">Continue to your image repository by signing in to your account.</p>

        <div class="login-card-container">
            <form class="login-form" id="customerLoginForm">

                <div class="input-group">
                    <input type="email" id="email" required autocomplete="email" placeholder=" ">
                    <label for="email">Email Address</label>
                </div>

                <div class="input-group password-group">
                    <input type="password" id="password" required autocomplete="current-password" placeholder=" ">
                    <label for="password">Password</label>
                    <button type="button" class="toggle-password" id="passwordToggle"
                        aria-label="Toggle password visibility">
                        <i class="fa-regular fa-eye-slash"></i>
                    </button>
                </div>

                <div class="forgot-password-wrapper">
                    <a href="#" class="forgot-link">Forgot Password</a>
                </div>

                <button type="submit" class="submit-login-btn">Log in</button>

                <div class="form-divider">
                    <span>or</span>
                </div>

                <button type="button" class="google-login-btn"
                    onclick="alert('Connecting to customer Google identity verification provider...')">
                    <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.7-4.53z"
                            fill="#EA4335" />
                    </svg>
                    <span>Log in with Google</span>
                </button>

            </form>
        </div>
    </div>

    <script>
        const passwordToggle = document.getElementById('passwordToggle');
        const passwordInput = document.getElementById('password');
        const toggleIcon = passwordToggle.querySelector('i');
        const customerLoginForm = document.getElementById('customerLoginForm');

        passwordToggle.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.className = 'fa-regular fa-eye';
            } else {
                passwordInput.type = 'password';
                toggleIcon.className = 'fa-regular fa-eye-slash';
            }
        });

        customerLoginForm.addEventListener('submit', (event) => {
            event.preventDefault();
            const customerEmail = document.getElementById('email').value;
            alert(`Customer authorization request received for repository target: ${customerEmail}`);
        });
    </script>
</body>

</html>
